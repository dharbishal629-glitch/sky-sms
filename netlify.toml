# ─────────────────────────────────────────────────────────────────────────────
# SKY SMS — Netlify configuration
#
# ARCHITECTURE:
#   Frontend (React/Vite)  → hosted here on Netlify (static)
#   API + PostgreSQL        → hosted on Replit Deployment (Node.js/Express)
#
# HOW TO DEPLOY:
#   1. In Replit, click "Deploy" → Publish to get your .replit.app URL
#   2. Replace REPLIT_API_URL below with that URL (no trailing slash)
#   3. Push to GitHub → Netlify auto-deploys the frontend
#   4. Set VITE_API_URL in Netlify → Site settings → Environment variables
# ─────────────────────────────────────────────────────────────────────────────

[build]
  base    = "."
  command = "npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm --filter @workspace/sim-rentals run build:netlify"
  publish = "artifacts/sim-rentals/dist"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10"

# ── API proxy ─────────────────────────────────────────────────────────────────
# Netlify cannot run Express. All /api/* requests are forwarded to your
# Replit-deployed API server. The :splat wildcard captures the full path,
# so /api/auth/user → https://your-app.replit.app/api/auth/user
#
# Replace the `to` value with your actual Replit deployment URL.
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR-APP.replit.app/api/:splat"
  status = 200
  force  = true

# ── SPA fallback ──────────────────────────────────────────────────────────────
# React Router / Wouter handles all client-side routes. Without this,
# refreshing any non-root URL (e.g. /dashboard) returns a 404.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ── Cache: immutable hashed assets (JS/CSS bundles) ──────────────────────────
# Vite appends a content hash to every bundle filename, so these are safe
# to cache for a full year. Browsers will automatically fetch new files
# whenever the hash changes (i.e. after any deploy).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache: fonts ──────────────────────────────────────────────────────────────
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── No-cache: HTML entry point ────────────────────────────────────────────────
# index.html must never be cached — it's the entry point that loads the
# hashed bundles. If it were cached, users would load stale JS after a deploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
