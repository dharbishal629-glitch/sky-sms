# ─────────────────────────────────────────────────────────────────────────────
# SKY SMS — Netlify configuration
#
# ARCHITECTURE:
#   Everything runs on Netlify:
#   • Frontend (React/Vite)  → Netlify static hosting  (artifacts/sim-rentals/dist)
#   • Backend (Express API)  → Netlify Functions        (netlify/functions/api/)
#   • Database               → External PostgreSQL      (Neon — neon.tech, free tier)
#
# HOW TO DEPLOY:
#   1. Create a free database at https://neon.tech (takes 2 minutes)
#   2. Copy the connection string (looks like postgres://user:pass@host.neon.tech/db)
#   3. In Netlify → Site settings → Environment variables, add:
#        DATABASE_URL         = <your Neon connection string>
#        SESSION_SECRET       = <any long random string>
#        NODE_ENV             = production
#        GOOGLE_CLIENT_ID     = <from Google Cloud Console>  (optional, for "Sign in with Google")
#        GOOGLE_CLIENT_SECRET = <from Google Cloud Console>  (optional)
#   4. Connect this GitHub repo in Netlify → it auto-deploys on every push
# ─────────────────────────────────────────────────────────────────────────────

[build]
  base    = "."
  command = "npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build:netlify && pnpm --filter @workspace/sim-rentals run build:netlify"
  publish = "artifacts/sim-rentals/dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"

# ── Netlify Functions config ───────────────────────────────────────────────────
# The Express API is pre-bundled by the build command into netlify/functions/api/
[functions]
  directory      = "netlify/functions"
  node_bundler   = "nft"

# ── API → Netlify Function ─────────────────────────────────────────────────────
# All /api/* requests go to the serverless Express function.
# serverless-http maps the full request path + headers + body to Express,
# so every existing route (/api/auth/user, /api/rentals, etc.) works as-is.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# ── SPA fallback ──────────────────────────────────────────────────────────────
# Every non-API route serves index.html so Wouter handles client-side routing.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ── Cache: immutable hashed JS/CSS bundles ────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── No-cache: HTML entry point ────────────────────────────────────────────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
